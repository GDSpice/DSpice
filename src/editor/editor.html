<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPICE Netlist Editor</title>
    <style>
body {
    margin: 0;
    font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    font-size: 13px;
    display: flex;
    flex-direction: column;
    height: 100vh;
}

.editor {
    flex: 1;
    padding-bottom: 0px;
    border: 1px solid #ddd;
    margin: 3px;
    margin-bottom: 30px;
    overflow: hidden;
}

        .menu-bar {
            background-color: #f8f9fa;
            border-bottom: 1px solid #ddd;
            display: flex;
            padding: 0;
            font-size: 12px;
        }
        .menu-item {
            position: relative;
            padding: 5px 10px;
            cursor: pointer;
            white-space: nowrap;
        }
        .menu-item:hover {
            background-color: #e9ecef;
        }
        .menu-item:hover .dropdown {
            display: block;
        }
        .dropdown {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            background-color: white;
            border: 1px solid #ddd;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            z-index: 1000;
            font-size: 12px;
        }
        .dropdown-item {
            padding: 4px 8px;
            white-space: nowrap;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .dropdown-item img {
            margin-right: 8px;
            width: 16px;
            height: 16px;
        }
        .dropdown-item span.shortcut {
            color: #888;
            margin-left: auto;
            padding-left: 10px;
            text-align: right;
        }
        .dropdown-item:hover {
            background-color: #f1f1f1;
        }
        .toolbar {
            background-color: #f8f9fa;
            border-bottom: 1px solid #ddd;
            padding: 5px;
            display: flex;
            align-items: center;
        }
        .toolbar button {
            background-color: white;
            border: 1px solid #ddd;
            padding: 5px;
            cursor: pointer;
        }
        .toolbar button img {
            width: 16px;
            height: 16px;
        }
        .description-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: #f8f9fa;
            border-top: 1px solid #ddd;
            padding: 5px;
            font-size: 12px;
            color: #333;
        }


.disabled {
    color: #aaa;
    cursor: not-allowed;
    pointer-events: none;
    z-index: 1;
}

.disabled .icon {
    filter: grayscale(100%);
    opacity: 0.5;
}

/* SPICE-specific syntax highlighting colors */
/* Directives (.TITLE, .SUBCKT, etc.) - Pink */
.cm-s-dracula .cm-keyword { color: #ff79c6; font-weight: bold; }
/* Element names (R1, C2, V3, etc.) - Blue */
.cm-s-dracula .cm-variable-2 { color: #4da6ff; }
/* Model names (NMOS, PMOS, etc.) - Blue */
.cm-s-dracula .cm-variable-3 { color: #4da6ff; }
/* Node names and identifiers - White */
.cm-s-dracula .cm-variable { color: #f8f8f2; }
/* Numbers and values - Light Red */
.cm-s-dracula .cm-number { color: #ff6b6b; }
/* Parameter names + values (NAME=VALUE, {expr}) - Light Red */
.cm-s-dracula .cm-property { color: #ff6b6b; }
/* Comments - Gray */
.cm-s-dracula .cm-comment { color: #6272a4; font-style: italic; }
/* Title line - Yellow */
.cm-s-dracula .cm-string { color: #f1fa8c; }
/* Operators - Orange */
.cm-s-dracula .cm-operator { color: #ffb86c; }
/* Brackets {} () [] - Cyan */
.cm-s-dracula .cm-bracket { color: #8be9fd; }
/* Functions V() I() - Light Red */
.cm-s-dracula .cm-def { color: #ff6b6b; }

    </style>

    <!-- CodeMirror CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.14/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.14/theme/dracula.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.14/addon/fold/foldgutter.min.css">

    <!-- CodeMirror JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.14/codemirror.min.js"></script>

    <!-- SPICE Mode using simplemode addon -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.14/addon/mode/simple.min.js"></script>
    <script>
    // Define SPICE netlist syntax highlighting mode
    CodeMirror.defineSimpleMode("spice", {
        // State: start - only the first line (title)
        start: [
          /*  {regex: /./, token: "string", next: "body"}*/
        ],
        // State: body - rest of the file
        body: [
            // 1. Comments (highest priority)
          /*  {regex: /^\*.*$/, token: "comment"},
            {regex: /;.*$/, token: "comment"},*/

            // 2. SPICE directives (start with .)
       /*     {regex: /\.(TITLE|SUBCKT|ENDS|INCLUDE|MODEL|PARAM|OPTION|OPTIONS|OP|DC|AC|TRAN|PZ|SENS|NOISE|DISTO|TF|FOUR|PRINT|PLOT|PROBE|SAVE|WIDTH|TEMP|STEP|ALTER|GLOBAL|IC|NODESET|END|MEAS|MEASURE|LET|SET|UNSET|SHOW|SHOWMOD|SHOWDEV|HARD|SOFT|RESET|RUN|RUNS|OPPOINT|LOAD|DSP|FFT|STATUS|STOP|WRITE|WRITEDATA|WRITESPICE|WRITECIR|WRITENETLIST|SOURCE|RESTART|RESUME|SHELL|SPAWN|CD|PWD|RND|RNDN|UNIF|GAUSS|AGAUSS|AUNIF|LIMIT|PWR|PWRS|SIGN|STP|TABLE|URAMP|IF|THEN|ELSE|ENDIF|WHILE|ENDWHILE|REPEAT|UNTIL|ENDREPEAT|DOWHILE|ENDDOWHILE|FOR|ENDFOR|BREAK|CONTINUE|LABEL|GOTO|ELSEIF|CONTROL|ENDC)\b/i, token: "keyword"}
*/
      
        ],
        meta: {
            lineComment: "*"
        }
    });
    </script>

    <!-- CodeMirror Add-ons for Code Folding -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.14/addon/fold/foldcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.14/addon/fold/foldgutter.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.14/addon/fold/indent-fold.min.js"></script>
<base target="_blank">
<base target="_blank">
</head>
<body>
    <!-- Menu Bar -->
    <div class="menu-bar"></div>

    <!-- Editor  -->
    <div class="editor">
      <textarea id="code"></textarea>
    </div>

    <!-- Description Bar -->
    <div class="description-bar" id="description-bar">Hover over an item for details.</div>
    <script src="editor.js"></script>

    <script>
    async function confirmAction(type_) {
        const result = await window.electron.showConfirmationEditDialog('You have unsaved changes. Do you want to save before closing?');

        if(type_==1){
            if(result==1) 
                window.electron.closeWindowEditor();
            if(result==2) 
                window.electron.saveCloseWindowEditor(editor.getValue(),setFile,1);
        } else{
            if(result==1) {
            if(type_==2)
                newFile();
            else if(type_==3)
                openFile();
            }
            if(result==2){
                const result= await window.electron.saveCloseWindowEditor(editor.getValue(),setFile,2);
               if(result.saved){
                  if(type_==2)
                     newFile();
                  else if(type_==3){           
                     setFile=result.path;
                     initialValue=editor.getValue();
                     editor.clearHistory();
                     start();
                     openFile();
                  }
               }
            }
        } 
    }

    document.addEventListener("DOMContentLoaded", () => {
        window.electron.onSetText((filePath,data) => {
            setFile=filePath;
            editor.setValue(data);
            initialValue=editor.getValue();
            editor.clearHistory();
            start();
        });
    });

    window.electron.closeEditor(() => {
          if(isTextChanged()) {
            confirmAction(1);
          } else {
            window.electron.closeWindowEditor();
          }
        });
    </script>
</body>
</html>
