<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Add similar models list</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Consolas', 'Courier New', monospace;
      background: #f5f5f5;
      color: #333;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .dialog-header {
      background: #fff;
      border-bottom: 1px solid #ddd;
      padding: 14px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    .dialog-header h2 {
      font-size: 12px;
      font-weight: 600;
      color: #333;
      font-family: 'Segoe UI', sans-serif;
    }
    .item-count {
      font-size: 12px;
      color: #666;
      background: #e3f2fd;
      padding: 4px 10px;
      border-radius: 12px;
      font-family: 'Segoe UI', sans-serif;
    }

    .lib-selector-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      background: #fafafa;
      border-bottom: 1px solid #e0e0e0;
      flex-shrink: 0;
    }
    .lib-selector-bar label {
      font-size: 12px;
      font-weight: 600;
      color: #555;
      font-family: 'Segoe UI', sans-serif;
      white-space: nowrap;
    }
    .lib-select {
      flex: 1;
      padding: 6px 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 12px;
      font-family: 'Consolas', monospace;
      background: #fff;
      color: #333;
      outline: none;
      cursor: pointer;
    }
    .lib-select:focus {
      border-color: #2196F3;
      box-shadow: 0 0 0 2px rgba(33,150,243,0.15);
    }
    .lib-select option {
      font-family: 'Consolas', monospace;
    }

    .editor-tabs {
      display: flex;
      background: #f5f5f5;
      border-bottom: 1px solid #ddd;
      flex-shrink: 0;
    }
    .editor-tab {
      padding: 8px 16px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      background: transparent;
      color: #888;
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
      font-family: 'Segoe UI', sans-serif;
    }
    .editor-tab.active {
      color: #2196F3;
      background: #fff;
      border-bottom-color: #2196F3;
    }
    .editor-tab:hover:not(.active) {
      color: #555;
      background: #eee;
    }

    .editor-container {
      flex: 1;
      padding: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .editor-wrapper {
      flex: 1;
      display: flex;
      position: relative;
      overflow: hidden;
    }

    .line-numbers {
      width: 50px;
      background: #f0f0f0;
      border-right: 1px solid #ddd;
      padding: 10px 0;
      text-align: right;
      font-size: 13px;
      line-height: 22px;
      color: #999;
      overflow: hidden;
      flex-shrink: 0;
      user-select: none;
    }
    .line-numbers span {
      display: block;
      padding-right: 10px;
      height: 22px;
    }
    .line-numbers span.current {
      color: #2196F3;
      font-weight: bold;
      background: #e3f2fd;
    }

    .editor-textarea {
      flex: 1;
      border: none;
      outline: none;
      padding: 10px 12px;
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 13px;
      line-height: 22px;
      resize: none;
      background: #fff;
      color: #333;
      white-space: pre;
      overflow: auto;
      tab-size: 4;
    }
    .editor-textarea::selection {
      background: #b3d9ff;
    }
    .editor-textarea.readonly {
      background: #fafafa;
      color: #666;
    }

    .preview-bar {
      background: #fff;
      border-top: 1px solid #ddd;
      padding: 10px 20px;
      max-height: 60px;
      overflow-y: auto;
      font-family: 'Segoe UI', sans-serif;
      flex-shrink: 0;
    }
    .preview-label {
      font-size: 11px;
      color: #666;
      margin-bottom: 4px;
      font-weight: 600;
    }
    .preview-text {
      font-family: 'Consolas', monospace;
      font-size: 12px;
      color: #2196F3;
      word-break: break-all;
      line-height: 1.5;
    }

    .buttons-bar {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 8px;
      padding: 12px 20px;
      background: #fff;
      border-top: 1px solid #ddd;
      flex-shrink: 0;
    }
    .btn {
      padding: 8px 24px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
      cursor: pointer;
      background: #f0f0f0;
      color: #333;
      transition: all 0.15s;
      font-family: 'Segoe UI', sans-serif;
      font-weight: 600;
    }
    .btn:hover:not(:disabled) {
      background: #e0e0e0;
    }
    .btn-primary {
      background: #2196F3;
      border-color: #1976D2;
      color: #fff;
    }
    .btn-primary:hover:not(:disabled) {
      background: #1976D2;
    }

    .editor-textarea::-webkit-scrollbar { width: 8px; }
    .editor-textarea::-webkit-scrollbar-track { background: #f1f1f1; }
    .editor-textarea::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px; }
    .editor-textarea::-webkit-scrollbar-thumb:hover { background: #a1a1a1; }
  </style>
<base target="_blank">
</head>
<body>
  <div class="dialog-header">
    <h2>Edit Models List</h2>
    <span class="item-count" id="item-count">0 items</span>
  </div>

  <div class="lib-selector-bar">
    <label>Library File:</label>
    <select class="lib-select" id="lib-select" onchange="onLibFileChange()">
      <option value="">-- Select a library file --</option>
    </select>
  </div>

  <div class="editor-tabs">
    <button class="editor-tab active" id="tab-items" onclick="switchTab('items')">Models</button>
    <button class="editor-tab" id="tab-raw" onclick="switchTab('raw')">Raw</button>
  </div>

  <div class="editor-container">
    <div class="editor-wrapper">
      <div class="line-numbers" id="line-numbers"></div>
      <textarea class="editor-textarea" id="editor" spellcheck="false"></textarea>
    </div>
  </div>

  <!--div class="preview-bar">
    <div class="preview-label">Preview (comma-separated):</div>
    <div class="preview-text" id="preview-text"></div>
  </div-->

  <div class="buttons-bar">
    <button class="btn" onclick="cancelDialog()">Cancel</button>
    <button class="btn btn-primary" onclick="submitResult()">OK</button>
  </div>

  <script>
    const { ipcRenderer } = require('electron');

    // State
    let currentTab = 'items';
    let itemsContent = '';
    let rawContent = '';
    let selectedFileName = '';
    let selectedFilePath = '';
    let libFiles = [];
    let isLoading = false;
    let previousFileIndex = -1; // remember previous selection

    // DOM refs
    const editor = document.getElementById('editor');
    const lineNumbers = document.getElementById('line-numbers');
    const previewText = document.getElementById('preview-text');
    const itemCount = document.getElementById('item-count');
    const libSelect = document.getElementById('lib-select');

    // ============================================
    // INIT - receives previous result
    // ============================================
    ipcRenderer.on('init-data', (event, data) => {
      libFiles = data.libFiles || [];
      const previous = data.previousResult || { file: '', items: '' };

      populateLibSelect();

      // Set initial items from previous result
      const lines = previous.items.split(',').map(s => s.trim()).filter(s => s.length > 0);
      itemsContent = lines.join('\n');
      selectedFileName = previous.file || '';

      // Find and select previous file in dropdown
      if (selectedFileName) {
        const fileIndex = libFiles.findIndex(f => f.name === selectedFileName);
        if (fileIndex >= 0) {
          previousFileIndex = fileIndex;
          libSelect.value = fileIndex;
          // Load models/subckts for this file
          const file = libFiles[fileIndex];
          selectedFilePath = file.fullPath;
         // ipcRenderer.send('get-spice-models', file.fullPath);
        }
      }

      // Show items tab
      currentTab = 'items';
      updateTabUI();
      editor.value = itemsContent;
      editor.readOnly = false;
      editor.classList.remove('readonly');
      updateLineNumbers();
      updatePreview();
      editor.focus();
    });

    // Handle models result from main process
    ipcRenderer.on('spice-models-result', (event, data) => {
      isLoading = false;

      if (data.error) {
        rawContent = '// Error: ' + data.error;
      } else {
        rawContent = data.rawContent || '// No content';
      }

      // Only update items if this is a NEW file selection (not init restore)
      // If we restored from previous, keep the user's edited items
      if (data.error) {
        // Don't overwrite items on error
      }

      // If we're on raw tab, refresh it
      if (currentTab === 'raw') {
        editor.value = rawContent;
        updateLineNumbers();
      }
    });

    // Populate library file select
    function populateLibSelect() {
      libSelect.innerHTML = '<option value="">-- Select a library file --</option>';
      libFiles.forEach((file, index) => {
        const opt = document.createElement('option');
        opt.value = index;
        opt.textContent = file.name;
        libSelect.appendChild(opt);
      });
    }

    // ============================================
    // LIBRARY FILE SELECTION
    // ============================================
    function onLibFileChange() {
      const index = parseInt(libSelect.value);

      if (isNaN(index) || index < 0) {
        selectedFileName = '';
        selectedFilePath = '';
        return;
      }

      const file = libFiles[index];
      selectedFileName = file.name;
      selectedFilePath = file.fullPath;
      previousFileIndex = index;

      // Request models/subckts from main process
      isLoading = true;
      ipcRenderer.send('get-spice-models', file.fullPath);

      // Load models+subckts into items (replace)
      // We need to wait for the result, but for now we can also
      // directly set a loading message
      itemsContent = '// Loading...';
      if (currentTab === 'items') {
        editor.value = itemsContent;
        updateLineNumbers();
      }
    }

    // Override the models result to update items when user selects a NEW file
    const originalModelsHandler = ipcRenderer.listeners('spice-models-result')[0];
    ipcRenderer.removeAllListeners('spice-models-result');
    ipcRenderer.on('spice-models-result', (event, data) => {
      isLoading = false;

      if (data.error) {
        rawContent = '// Error: ' + data.error;
        itemsContent = '// Error: ' + data.error;
      } else {
        rawContent = data.rawContent || '// No content';

        // Combine models + subckts into Items (for NEW selection)
        const allItems = [];
        if (data.models && data.models.length > 0) {
          allItems.push(...data.models);
        }
        if (data.subckts && data.subckts.length > 0) {
          allItems.push(...data.subckts);
        }
        itemsContent = allItems.length > 0 ? allItems.join('\n') : '// No models or subcircuits found';
      }

      // Update display if on items tab
      if (currentTab === 'items') {
        editor.value = itemsContent;
        updateLineNumbers();
        updatePreview();
      } else if (currentTab === 'raw') {
        editor.value = rawContent;
        updateLineNumbers();
      }
    });

    // ============================================
    // TABS
    // ============================================
    function switchTab(tab) {
      // Save current items content before switching
      if (currentTab === 'items') {
        itemsContent = editor.value;
      }

      currentTab = tab;
      updateTabUI();

      if (tab === 'items') {
        editor.value = itemsContent;
        editor.readOnly = false;
        editor.classList.remove('readonly');
        updateLineNumbers();
        updatePreview();
      } else if (tab === 'raw') {
        editor.value = rawContent || '// Select a library file to view raw content';
        editor.readOnly = true;
        editor.classList.add('readonly');
        updateLineNumbers();
      }
    }

    function updateTabUI() {
      document.getElementById('tab-items').classList.toggle('active', currentTab === 'items');
      document.getElementById('tab-raw').classList.toggle('active', currentTab === 'raw');
    }

    // ============================================
    // EDITOR FUNCTIONS
    // ============================================
    function updateLineNumbers() {
      const lines = editor.value.split('\n');
      const currentLine = getCurrentLineNumber();

      lineNumbers.innerHTML = '';
      lines.forEach((_, i) => {
        const span = document.createElement('span');
        span.textContent = i + 1;
        if (i === currentLine) {
          span.classList.add('current');
        }
        lineNumbers.appendChild(span);
      });

      // Update item count (only for items tab)
      if (currentTab === 'items') {
        const nonEmpty = lines.filter(s => s.trim().length > 0 && !s.startsWith('//'));
        itemCount.textContent = nonEmpty.length + ' item' + (nonEmpty.length !== 1 ? 's' : '');
      }
    }

    function getCurrentLineNumber() {
      const textBeforeCursor = editor.value.substring(0, editor.selectionStart);
      return textBeforeCursor.split('\n').length - 1;
    }

    function updatePreview() {
      //const lines = editor.value.split('\n').map(s => s.trim()).filter(s => s.length > 0 && !s.startsWith('//'));
      //previewText.textContent = lines.join(',');
    }

    // Sync scroll
    editor.addEventListener('scroll', () => {
      lineNumbers.scrollTop = editor.scrollTop;
    });

    // Input
    editor.addEventListener('input', () => {
      if (currentTab === 'items') {
        itemsContent = editor.value;
      }
      updateLineNumbers();
      if (currentTab === 'items') {
        updatePreview();
      }
    });

    // Cursor move
    editor.addEventListener('keyup', (e) => {
      if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Home','End','PageUp','PageDown'].includes(e.key)) {
        updateLineNumbers();
      }
    });

    editor.addEventListener('click', () => {
      updateLineNumbers();
    });

    // Tab key
    editor.addEventListener('keydown', (e) => {
      if (e.key === 'Tab') {
        e.preventDefault();
        const start = editor.selectionStart;
        const end = editor.selectionEnd;
        editor.value = editor.value.substring(0, start) + '    ' + editor.value.substring(end);
        editor.selectionStart = editor.selectionEnd = start + 4;
        if (currentTab === 'items') {
          itemsContent = editor.value;
        }
        updateLineNumbers();
        if (currentTab === 'items') {
          updatePreview();
        }
      }
    });

    // ============================================
    // SUBMIT / CANCEL
    // ============================================
    function submitResult() {
      // Ensure items content is current
      if (currentTab === 'items') {
        itemsContent = editor.value;
      }

      const lines = itemsContent.split('\n').map(s => s.trim()).filter(s => s.length > 0 && !s.startsWith('//'));
      const itemsString = lines.join(',');

      // Return: { file: "selectedFileName", items: "item1,item2,..." }
      const result = {
        file: selectedFileName,
        items: itemsString
      };

      ipcRenderer.send('dialog-result', result);
    }

    function cancelDialog() {
      ipcRenderer.send('dialog-result', null);
    }
  </script>
</body>
</html>
