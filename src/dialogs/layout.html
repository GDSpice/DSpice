<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Edit Layout & Outputs</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f5f5f5;
      color: #333;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .dialog-header {
      background: #fff;
      border-bottom: 1px solid #ddd;
      padding: 14px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    .dialog-header h2 {
      font-size: 16px;
      font-weight: 600;
      color: #333;
    }

    .editor-tabs {
      display: flex;
      background: #f5f5f5;
      border-bottom: 1px solid #ddd;
      flex-shrink: 0;
    }
    .editor-tab {
      padding: 10px 20px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      background: transparent;
      color: #888;
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
    }
    .editor-tab.active {
      color: #2196F3;
      background: #fff;
      border-bottom-color: #2196F3;
    }
    .editor-tab:hover:not(.active) {
      color: #555;
      background: #eee;
    }

    .tab-content {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: none;
    }
    .tab-content.active {
      display: block;
    }

    .form-group {
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .form-group label {
      width: 200px;
      font-size: 12px;
      font-weight: 600;
      color: #555;
      text-align: right;
      flex-shrink: 0;
    }
    .form-group .field-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .form-group input[type="text"],
    .form-group input[type="number"],
    .form-group select {
      flex: 1;
      padding: 7px 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
      font-family: 'Consolas', monospace;
      background: #fff;
      color: #333;
      outline: none;
      min-width: 0;
    }
    .form-group input:focus,
    .form-group select:focus {
      border-color: #2196F3;
      box-shadow: 0 0 0 2px rgba(33,150,243,0.15);
    }
    .form-group input[type="color"] {
      width: 55px;
      height: 32px;
      padding: 2px;
      border: 1px solid #ccc;
      border-radius: 4px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .form-group .color-value {
      font-family: 'Consolas', monospace;
      font-size: 11px;
      color: #666;
      min-width: 65px;
    }
    .form-group input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }
    .form-group select {
      cursor: pointer;
    }

    .section-title {
      font-size: 13px;
      font-weight: 700;
      color: #2196F3;
      margin: 18px 0 10px 0;
      padding-bottom: 5px;
      border-bottom: 2px solid #e3f2fd;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .section-title:first-child {
      margin-top: 0;
    }
    .section-title .axis-badge {
      background: #2196F3;
      color: #fff;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
    }

    .grid-info {
      background: #e3f2fd;
      border-radius: 4px;
      padding: 8px 12px;
      font-size: 12px;
      color: #1976D2;
      margin-bottom: 14px;
    }

    .axis-section {
      background: #fafafa;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      padding: 12px 16px;
      margin-bottom: 12px;
    }
    .axis-section-title {
      font-size: 12px;
      font-weight: 700;
      color: #555;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .axis-section-title .axis-num {
      background: #2196F3;
      color: #fff;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
    }

    .outputs-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .outputs-table th {
      background: #f0f0f0;
      padding: 10px 12px;
      text-align: left;
      font-weight: 600;
      color: #555;
      border-bottom: 2px solid #ddd;
    }
    .outputs-table td {
      padding: 8px 12px;
      border-bottom: 1px solid #eee;
    }
    .outputs-table input[type="number"] {
      width: 70px;
      padding: 6px 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
      font-family: 'Consolas', monospace;
    }
    .outputs-table .pos-error {
      color: #f44336;
      font-size: 11px;
      margin-left: 6px;
    }
    .outputs-table .pos-valid {
      color: #4caf50;
      font-size: 11px;
      margin-left: 6px;
    }

    .buttons-bar {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 8px;
      padding: 12px 20px;
      background: #fff;
      border-top: 1px solid #ddd;
      flex-shrink: 0;
    }
    .btn {
      padding: 8px 24px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
      cursor: pointer;
      background: #f0f0f0;
      color: #333;
      transition: all 0.15s;
      font-weight: 600;
    }
    .btn:hover:not(:disabled) {
      background: #e0e0e0;
    }
    .btn-primary {
      background: #2196F3;
      border-color: #1976D2;
      color: #fff;
    }
    .btn-primary:hover:not(:disabled) {
      background: #1976D2;
    }
    .btn-primary:disabled {
      background: #90caf9;
      border-color: #90caf9;
      cursor: not-allowed;
    }

    .axis-subgroup {
      margin-left: 20px;
      padding-left: 12px;
      border-left: 2px solid #e3f2fd;
      margin-bottom: 8px;
    }

    .new-prop-badge {
      background: #4caf50;
      color: #fff;
      font-size: 9px;
      padding: 1px 5px;
      border-radius: 8px;
      margin-left: 6px;
      font-weight: 700;
    }
  </style>
<base target="_blank">
</head>
<body>
  <!--div class="dialog-header">
    <h2>Edit Layout & Outputs</h2>
  </div-->

  <div class="editor-tabs">
    <button class="editor-tab active" id="tab-layout" onclick="switchTab('layout')">Layout</button>
    <button class="editor-tab" id="tab-outputs" onclick="switchTab('outputs')">Outputs</button>
  </div>

  <!-- LAYOUT TAB -->
  <div class="tab-content active" id="content-layout">

    <!-- Title & Font -->
    <div class="section-title">Font</div>

    <div class="form-group">
      <label>Font color</label>
      <div class="field-wrapper">
        <input type="color" id="layout-font-color" onchange="updateColorLabel(this)">
        <span class="color-value" id="layout-font-color-val">#333333</span>
      </div>
    </div>

    <div class="form-group">
      <label>Font size</label>
      <div class="field-wrapper">
        <input type="number" id="layout-font-size" min="1" value="14">
      </div>
    </div>

    <div class="form-group">
      <label>Font family</label>
      <div class="field-wrapper">
        <select id="layout-font-family">
          <option value="Arial">Arial</option>
          <option value="Helvetica">Helvetica</option>
          <option value="Times New Roman">Times New Roman</option>
          <option value="Courier New">Courier New</option>
          <option value="Georgia">Georgia</option>
          <option value="Verdana">Verdana</option>
          <option value="Tahoma">Tahoma</option>
          <option value="Trebuchet MS">Trebuchet MS</option>
          <option value="Impact">Impact</option>
          <option value="Comic Sans MS">Comic Sans MS</option>
          <option value="Segoe UI">Segoe UI</option>
          <option value="Roboto">Roboto</option>
          <option value="Open Sans">Open Sans</option>
          <option value="Lato">Lato</option>
          <option value="Montserrat">Montserrat</option>
        </select>
      </div>
    </div>

    <!-- Colors -->
    <div class="section-title">Colors</div>

    <div class="form-group">
      <label>Paper background color</label>
      <div class="field-wrapper">
        <input type="color" id="layout-paper-bgcolor" onchange="updateColorLabel(this)">
        <span class="color-value" id="layout-paper-bgcolor-val">#ffffff</span>
      </div>
    </div>

    <div class="form-group">
      <label>Plot background color</label>
      <div class="field-wrapper">
        <input type="color" id="layout-plot-bgcolor" onchange="updateColorLabel(this)">
        <span class="color-value" id="layout-plot-bgcolor-val">#f8f8f8</span>
      </div>
    </div>

    <div class="form-group">
      <label>Border color</label>
      <div class="field-wrapper">
        <input type="color" id="layout-bordercolor" onchange="updateColorLabel(this)">
        <span class="color-value" id="layout-bordercolor-val">#cccccc</span>
      </div>
    </div>

    <!-- Grid Settings -->
    <div class="section-title">Grid Settings</div>

    <div class="form-group">
      <label>Grid rows</label>
      <div class="field-wrapper">
        <input type="number" id="layout-grid-rows" min="1" value="1" onchange="onGridChange()">
      </div>
    </div>

    <div class="form-group">
      <label>Grid columns</label>
      <div class="field-wrapper">
        <input type="number" id="layout-grid-columns" min="1" value="1" onchange="onGridChange()">
      </div>
    </div>

    <div class="grid-info" id="grid-info">
      Total subplots: <strong>1</strong> (1 row × 1 column)
    </div>

    <!-- Primary Y Axis -->
    <div class="section-title">
       Y Axis (Primary)
    </div>

    <div class="form-group">
      <label>Y-axis type</label>
      <div class="field-wrapper">
        <select id="layout-yaxis-type">
          <option value="linear">linear</option>
          <option value="log">log</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label>Y-axis grid color</label>
      <div class="field-wrapper">
        <input type="color" id="layout-yaxis-gridcolor" onchange="updateColorLabel(this)">
        <span class="color-value" id="layout-yaxis-gridcolor-val">#e0e0e0</span>
      </div>
    </div>

    <div class="form-group">
      <label>Show Y-axis grid</label>
      <div class="field-wrapper">
        <input type="checkbox" id="layout-yaxis-showgrid" checked>
      </div>
    </div>

    <!-- Primary X Axis -->
    <div class="section-title">
       X Axis (Primary)
    </div>

    <div class="form-group">
      <label>X-axis type</label>
      <div class="field-wrapper">
        <select id="layout-xaxis-type">
          <option value="linear">linear</option>
          <option value="log">log</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label>X-axis grid color</label>
      <div class="field-wrapper">
        <input type="color" id="layout-xaxis-gridcolor" onchange="updateColorLabel(this)">
        <span class="color-value" id="layout-xaxis-gridcolor-val">#e0e0e0</span>
      </div>
    </div>

    <div class="form-group">
      <label>Show X-axis grid</label>
      <div class="field-wrapper">
        <input type="checkbox" id="layout-xaxis-showgrid" checked>
      </div>
    </div>

    <!-- Legend -->
    <div class="section-title">Legend</div>

    <div class="form-group">
      <label>Show legend</label>
      <div class="field-wrapper">
        <input type="checkbox" id="layout-showlegend" checked>
      </div>
    </div>

    <!-- Dynamic Axis Sections -->
    <div id="dynamic-axis-sections"></div>
  </div>

  <!-- OUTPUTS TAB -->
  <div class="tab-content" id="content-outputs">
    <div class="section-title">Outputs Configuration</div>
    <div class="grid-info" id="outputs-grid-info">
      Each output position must be between 1 and <strong>1</strong>
    </div>
    <table class="outputs-table" id="outputs-table">
      <thead>
        <tr>
          <th>#</th>
          <th>Name</th>
          <th>Position (1-<span id="max-pos">1</span>)</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="outputs-tbody">
      </tbody>
    </table>
  </div>
<div class="buttons-bar">
    <button class="btn" onclick="cancelDialog()">Cancel</button>
    <button class="btn btn-primary" id="btn-ok" onclick="submitResult()">OK</button>
  </div>

  <script>
  

    // State
    let layoutData = {};
    let outputsData = [];
    let currentTab = 'layout';

    // ============================================
    // INIT
    // ============================================
    document.addEventListener("DOMContentLoaded", () => {
            window.electron.onSetLayout((data) => {
      const previous = data;
      layoutData = previous.layout || {};
      outputsData = previous.outputs || [];

      // Ensure all required properties exist (add defaults if missing)
      ensureLayoutDefaults();

      // Fill layout fields
      
      setColor('layout-font-color', layoutData.font?.color || '#333333');
      document.getElementById('layout-font-size').value = layoutData.font?.size || 14;
      document.getElementById('layout-font-family').value = layoutData.font?.family || 'Arial';

      setColor('layout-paper-bgcolor', layoutData.paper_bgcolor || '#ffffff');
      setColor('layout-plot-bgcolor', layoutData.plot_bgcolor || '#f8f8f8');
      setColor('layout-bordercolor', layoutData.bordercolor || '#cccccc');

      document.getElementById('layout-grid-rows').value = layoutData.grid?.rows || 1;
      document.getElementById('layout-grid-columns').value = layoutData.grid?.columns || 1;

      // Y Axis primary
      document.getElementById('layout-yaxis-type').value = layoutData.yaxis?.type || 'linear';
            setColor('layout-yaxis-gridcolor', layoutData.yaxis?.gridcolor || '#e0e0e0');
      document.getElementById('layout-yaxis-showgrid').checked = layoutData.yaxis?.showgrid !== false;

      // X Axis primary
      document.getElementById('layout-xaxis-type').value = layoutData.xaxis?.type || 'linear';
            setColor('layout-xaxis-gridcolor', layoutData.xaxis?.gridcolor || '#e0e0e0');
      document.getElementById('layout-xaxis-showgrid').checked = layoutData.xaxis?.showgrid !== false;

      document.getElementById('layout-showlegend').checked = layoutData.showlegend !== false;

      // Build dynamic axis sections
      buildDynamicAxisSections();

      // Build outputs table
      buildOutputsTable();

      updateGridInfo();
      updatePreview();
    });
  });

  function updatePreview(){

  }
    // ============================================
    // ENSURE DEFAULTS (add missing properties)
    // ============================================
    function ensureLayoutDefaults() {
            if (!layoutData.font) layoutData.font = {};
      if (layoutData.font.color === undefined) layoutData.font.color = '#333333';
      if (layoutData.font.size === undefined) layoutData.font.size = 14;
      if (layoutData.font.family === undefined) layoutData.font.family = 'Arial';

      if (layoutData.paper_bgcolor === undefined) layoutData.paper_bgcolor = '#ffffff';
      if (layoutData.plot_bgcolor === undefined) layoutData.plot_bgcolor = '#f8f8f8';
      if (layoutData.bordercolor === undefined) layoutData.bordercolor = '#cccccc';

      if (!layoutData.yaxis) layoutData.yaxis = {};
      if (layoutData.yaxis.type === undefined) layoutData.yaxis.type = 'linear';
            if (layoutData.yaxis.gridcolor === undefined) layoutData.yaxis.gridcolor = '#e0e0e0';
      if (layoutData.yaxis.showgrid === undefined) layoutData.yaxis.showgrid = true;

      if (!layoutData.xaxis) layoutData.xaxis = {};
      if (layoutData.xaxis.type === undefined) layoutData.xaxis.type = 'linear';
            if (layoutData.xaxis.gridcolor === undefined) layoutData.xaxis.gridcolor = '#e0e0e0';
      if (layoutData.xaxis.showgrid === undefined) layoutData.xaxis.showgrid = true;

      if (layoutData.showlegend === undefined) layoutData.showlegend = true;

      if (!layoutData.grid) layoutData.grid = {};
      if (layoutData.grid.rows === undefined) layoutData.grid.rows = 1;
      if (layoutData.grid.columns === undefined) layoutData.grid.columns = 1;

      // Ensure dynamic axes have defaults too
      const total = (layoutData.grid.rows || 1) * (layoutData.grid.columns || 1);
      for (let i = 2; i <= total; i++) {
        const yKey = 'yaxis' + i;
        const xKey = 'xaxis' + i;
        if (!layoutData[yKey]) layoutData[yKey] = {};
        if (layoutData[yKey].type === undefined) layoutData[yKey].type = 'linear';
                
        if (layoutData[yKey].gridcolor === undefined) layoutData[yKey].gridcolor = '#e0e0e0';
        if (layoutData[yKey].showgrid === undefined) layoutData[yKey].showgrid = true;

        if (!layoutData[xKey]) layoutData[xKey] = {};
        if (layoutData[xKey].type === undefined) layoutData[xKey].type = 'linear';
                
        if (layoutData[xKey].gridcolor === undefined) layoutData[xKey].gridcolor = '#e0e0e0';
        if (layoutData[xKey].showgrid === undefined) layoutData[xKey].showgrid = true;
      }
    }

    // ============================================
    // HELPERS
    // ============================================
    function setColor(id, color) {
      const input = document.getElementById(id);
      const valSpan = document.getElementById(id + '-val');
      if (input) input.value = normalizeColor(color);
      if (valSpan) valSpan.textContent = color;
    }

    function normalizeColor(color) {
      if (!color || color.startsWith('#')) return color || '#000000';
      const map = {
        'white': '#ffffff', 'black': '#000000', 'red': '#ff0000',
        'green': '#008000', 'blue': '#0000ff', 'yellow': '#ffff00',
        'gray': '#808080', 'grey': '#808080', 'lightgray': '#d3d3d3',
        'lightgrey': '#d3d3d3', 'darkgray': '#a9a9a9', 'darkgrey': '#a9a9a9'
      };
      return map[color.toLowerCase()] || '#000000';
    }

    function updateColorLabel(input) {
      const valSpan = document.getElementById(input.id + '-val');
      if (valSpan) valSpan.textContent = input.value;
      updatePreview();
    }

    function getColor(id) {
      const el = document.getElementById(id);
      return el ? el.value : '#000000';
    }

    function getInt(id, minVal) {
      const el = document.getElementById(id);
      const val = parseInt(el ? el.value : minVal);
      return isNaN(val) ? minVal : Math.max(minVal, val);
    }

    function getText(id) {
      const el = document.getElementById(id);
      return el ? el.value : '';
    }

    function getSelect(id) {
      const el = document.getElementById(id);
      return el ? el.value : '';
    }

    function getBool(id) {
      const el = document.getElementById(id);
      return el ? el.checked : false;
    }

    // ============================================
    // GRID CHANGE
    // ============================================
    function onGridChange() {
      const rows = getInt('layout-grid-rows', 1);
      const cols = getInt('layout-grid-columns', 1);
      const total = rows * cols;

      // Ensure defaults for any new axes that might be needed
      for (let i = 2; i <= total; i++) {
        const yKey = 'yaxis' + i;
        const xKey = 'xaxis' + i;
        if (!layoutData[yKey]) layoutData[yKey] = {};
        if (layoutData[yKey].type === undefined) layoutData[yKey].type = 'linear';
                
        if (layoutData[yKey].gridcolor === undefined) layoutData[yKey].gridcolor = '#e0e0e0';
        if (layoutData[yKey].showgrid === undefined) layoutData[yKey].showgrid = true;

        if (!layoutData[xKey]) layoutData[xKey] = {};
        if (layoutData[xKey].type === undefined) layoutData[xKey].type = 'linear';
                
        if (layoutData[xKey].gridcolor === undefined) layoutData[xKey].gridcolor = '#e0e0e0';
        if (layoutData[xKey].showgrid === undefined) layoutData[xKey].showgrid = true;
      }

      validateAllOutputs(total);
      updateGridInfo();
      buildDynamicAxisSections();
      updatePreview();
    }

    function updateGridInfo() {
      const rows = getInt('layout-grid-rows', 1);
      const cols = getInt('layout-grid-columns', 1);
      const total = rows * cols;

      document.getElementById('grid-info').innerHTML = 
        `Total subplots: <strong>${total}</strong> (${rows} row${rows!==1?'s':''} × ${cols} column${cols!==1?'s':''})`;
      document.getElementById('outputs-grid-info').innerHTML = 
        `Each output position must be between 1 and <strong>${total}</strong>`;
      document.getElementById('max-pos').textContent = total;
    }

    // ============================================
    // DYNAMIC AXIS SECTIONS (with type & title)
    // ============================================
    function buildDynamicAxisSections() {
      const rows = getInt('layout-grid-rows', 1);
      const cols = getInt('layout-grid-columns', 1);
      const total = rows * cols;
      const container = document.getElementById('dynamic-axis-sections');

      container.innerHTML = '';

      if (total <= 1) return;

      for (let i = 2; i <= total; i++) {
        const yData = layoutData['yaxis' + i] || {};
        const xData = layoutData['xaxis' + i] || {};

        const div = document.createElement('div');
        div.className = 'axis-section';
        div.innerHTML = `
          <div class="axis-section-title">
            <span class="axis-num">${i}</span>
            Subplot ${i}
          </div>

          <!-- Y Axis ${i} -->
          <div class="form-group">
            <label>yaxis${i}.type</label>
            <div class="field-wrapper">
              <select id="yaxis${i}-type" onchange="updatePreview();">
                <option value="linear" ${(yData.type||'linear')==='linear'?'selected':''}>linear</option>
                <option value="log" ${(yData.type||'linear')==='log'?'selected':''}>log</option>
              </select>
            </div>
          </div>
          
          <div class="form-group">
            <label>yaxis${i}.gridcolor</label>
            <div class="field-wrapper">
              <input type="color" id="yaxis${i}-gridcolor" value="${normalizeColor(yData.gridcolor || '#e0e0e0')}" onchange="updateColorLabel(this); updatePreview();">
              <span class="color-value" id="yaxis${i}-gridcolor-val">${yData.gridcolor || '#e0e0e0'}</span>
            </div>
          </div>
          <div class="form-group">
            <label>yaxis${i}.showgrid</label>
            <div class="field-wrapper">
              <input type="checkbox" id="yaxis${i}-showgrid" ${yData.showgrid !== false ? 'checked' : ''} onchange="updatePreview();">
            </div>
          </div>

          <!-- X Axis ${i} -->
          <div class="form-group">
            <label>xaxis${i}.type</label>
            <div class="field-wrapper">
              <select id="xaxis${i}-type" onchange="updatePreview();">
                <option value="linear" ${(xData.type||'linear')==='linear'?'selected':''}>linear</option>
                <option value="log" ${(xData.type||'linear')==='log'?'selected':''}>log</option>
              </select>
            </div>
          </div>
          
          <div class="form-group">
            <label>xaxis${i}.gridcolor</label>
            <div class="field-wrapper">
              <input type="color" id="xaxis${i}-gridcolor" value="${normalizeColor(xData.gridcolor || '#e0e0e0')}" onchange="updateColorLabel(this); updatePreview();">
              <span class="color-value" id="xaxis${i}-gridcolor-val">${xData.gridcolor || '#e0e0e0'}</span>
            </div>
          </div>
          <div class="form-group">
            <label>xaxis${i}.showgrid</label>
            <div class="field-wrapper">
              <input type="checkbox" id="xaxis${i}-showgrid" ${xData.showgrid !== false ? 'checked' : ''} onchange="updatePreview();">
            </div>
          </div>
        `;
        container.appendChild(div);
      }
    }

    function escapeAttr(text) {
      if (!text) return '';
      return text.replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    // ============================================
    // OUTPUTS TABLE
    // ============================================
    function buildOutputsTable() {
      const tbody = document.getElementById('outputs-tbody');
      const maxPos = getInt('layout-grid-rows', 1) * getInt('layout-grid-columns', 1);

      tbody.innerHTML = '';

      outputsData.forEach((output, index) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${index + 1}</td>
          <td>${escapeHtml(output.name || 'Output ' + (index + 1))}</td>
          <td>
            <input type="number" id="output-pos-${index}" value="${output.pos || 1}" 
              min="1" max="${maxPos}" onchange="validateOutput(${index}, ${maxPos})" oninput="validateOutput(${index}, ${maxPos})">
            <span id="output-status-${index}"></span>
          </td>
          <td id="output-cell-status-${index}"></td>
        `;
        tbody.appendChild(tr);
      });

      validateAllOutputs(maxPos);
    }

    function validateOutput(index, maxPos) {
      const input = document.getElementById('output-pos-' + index);
      const status = document.getElementById('output-status-' + index);
      const cellStatus = document.getElementById('output-cell-status-' + index);
      if (!input || !status || !cellStatus) return false;

      const val = parseInt(input.value);

      if (isNaN(val) || val < 1 || val > maxPos) {
        status.textContent = '❌';
        status.className = 'pos-error';
        cellStatus.innerHTML = '<span class="pos-error">Invalid (1-' + maxPos + ')</span>';
        input.style.borderColor = '#f44336';
        return false;
      } else {
        status.textContent = '✓';
        status.className = 'pos-valid';
        cellStatus.innerHTML = '<span class="pos-valid">Valid</span>';
        input.style.borderColor = '#ccc';
        return true;
      }
    }

    function validateAllOutputs(maxPos) {
      let allValid = true;
      outputsData.forEach((_, index) => {
        if (!validateOutput(index, maxPos)) allValid = false;
      });
      const btnOk = document.getElementById('btn-ok');
      if (btnOk) btnOk.disabled = !allValid;
      return allValid;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // ============================================
    // TABS
    // ============================================
    function switchTab(tab) {
      currentTab = tab;

      document.querySelectorAll('.editor-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));

      document.getElementById('tab-' + tab).classList.add('active');
      document.getElementById('content-' + tab).classList.add('active');


    }

    // ============================================
    // BUILD RESULT
    // ============================================
    function buildResult() {
      const rows = getInt('layout-grid-rows', 1);
      const cols = getInt('layout-grid-columns', 1);
      const total = rows * cols;

      const layout = {
            margin: {
          l: 35,
          r: 25,
          b: 80,
          t: 35
      },
        font: {
          color: getColor('layout-font-color'),
          size: getInt('layout-font-size', 1),
          family: getSelect('layout-font-family')
        },
        paper_bgcolor: getColor('layout-paper-bgcolor'),
        plot_bgcolor: getColor('layout-plot-bgcolor'),
        bordercolor: getColor('layout-bordercolor'),
        yaxis: {
          type: getSelect('layout-yaxis-type'),
          gridcolor: getColor('layout-yaxis-gridcolor'),
          showgrid: getBool('layout-yaxis-showgrid')
        },
        xaxis: {
          type: getSelect('layout-xaxis-type'),
          gridcolor: getColor('layout-xaxis-gridcolor'),
          showgrid: getBool('layout-xaxis-showgrid')
        },
        showlegend: getBool('layout-showlegend'),
        grid: { rows: rows, columns: cols, pattern: 'independent',  roworder: 'bottom to top' }
      };

      // Add dynamic axes
      for (let i = 2; i <= total; i++) {
        const yType = document.getElementById('yaxis' + i + '-type');
        const yGridcolor = document.getElementById('yaxis' + i + '-gridcolor');
        const yShowgrid = document.getElementById('yaxis' + i + '-showgrid');

        const xType = document.getElementById('xaxis' + i + '-type');
        const xGridcolor = document.getElementById('xaxis' + i + '-gridcolor');
        const xShowgrid = document.getElementById('xaxis' + i + '-showgrid');

        layout['yaxis' + i] = {
          type: yType ? yType.value : 'linear',
          gridcolor: yGridcolor ? yGridcolor.value : '#e0e0e0',
          showgrid: yShowgrid ? yShowgrid.checked : true
        };

        layout['xaxis' + i] = {
          type: xType ? xType.value : 'linear',
          gridcolor: xGridcolor ? xGridcolor.value : '#e0e0e0',
          showgrid: xShowgrid ? xShowgrid.checked : true
        };
      }

      // Build outputs
      const outputs = outputsData.map((output, index) => {
        const posEl = document.getElementById('output-pos-' + index);
        return {
          pos: posEl ? (parseInt(posEl.value) || 1) : 1,
          name: output.name
        };
      });

      return { layout, outputs };
    }


    // ============================================
    // SUBMIT / CANCEL
    // ============================================
    function submitResult() {
      const maxPos = getInt('layout-grid-rows', 1) * getInt('layout-grid-columns', 1);
      if (!validateAllOutputs(maxPos)) {
        alert('Please fix invalid output positions before submitting.');
        return;
      }

      const result = buildResult();
      window.electron.sendEditedLayout(result);
    }

    function cancelDialog() {
      window.electron.sendEditedLayout(null);
    }


    // Update on any input change
    document.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('input, select').forEach(el => {
        el.addEventListener('change', () => {});
        el.addEventListener('input', () => {});
      });
    });
  </script>
</body>
</html>
