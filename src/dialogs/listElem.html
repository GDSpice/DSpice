<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Select Signal</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f5f5f5;
      color: #333;
      padding: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .dialog-header {
      background: #fff;
      border-bottom: 1px solid #ddd;
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .dialog-header h2 {
      font-size: 14px;
      font-weight: 600;
      color: #333;
    }
    .selected-display {
      font-size: 12px;
      color: #2196F3;
      font-weight: 600;
      font-family: 'Consolas', monospace;
    }

    #tree-container {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }

    .section-header {
      display: flex;
      align-items: center;
      padding: 8px 16px;
      cursor: pointer;
      user-select: none;
      border-bottom: 1px solid #e0e0e0;
      background: #fafafa;
    }
    .section-header:hover { background: #f0f0f0; }
    .section-header .arrow {
      width: 16px;
      height: 16px;
      margin-right: 6px;
      font-size: 10px;
      color: #666;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s;
    }
    .section-header .arrow.collapsed { transform: rotate(-90deg); }
    .section-header .section-title {
      font-size: 13px;
      font-weight: 600;
      color: #555;
    }

    .component-node {
      border-bottom: 1px solid #e8e8e8;
    }

    .children {
      overflow: hidden;
      transition: all 0.25s ease;
    }
    .children.collapsed {
      max-height: 0;
      opacity: 0;
    }

    .sub-group {
      margin-left: 16px;
      border-left: 2px solid #e0e0e0;
    }
    .sub-group-header {
      display: flex;
      align-items: center;
      padding: 6px 12px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      color: #666;
      background: #f9f9f9;
      border-bottom: 1px solid #eee;
    }
    .sub-group-header:hover { background: #f0f0f0; }
    .sub-group-header .arrow {
      width: 14px;
      margin-right: 4px;
      font-size: 9px;
      color: #888;
      transition: transform 0.2s;
    }
    .sub-group-header .arrow.collapsed { transform: rotate(-90deg); }

    .signal-row {
      display: flex;
      align-items: center;
      padding: 7px 12px 7px 32px;
      border-bottom: 1px solid #f0f0f0;
      cursor: pointer;
      transition: all 0.15s ease;
      user-select: none;
    }
    .signal-row:hover {
      background: #e3f2fd;
    }
    .signal-row.selected {
      background: #2196F3 !important;
      color: #fff !important;
    }
    .signal-row.selected .signal-label {
      color: #fff;
    }
    .signal-row.selected .type-indicator {
      border-color: #fff;
    }

    .type-indicator {
      width: 12px;
      height: 12px;
      border: 1px solid #bbb;
      border-radius: 2px;
      margin-right: 10px;
      flex-shrink: 0;
    }
    .type-voltage { background: #4CAF50; }
    .type-current { background: #FF9800; }
    .type-item { background: #2196F3; }

    .signal-label {
      font-size: 12px;
      color: #444;
      font-family: 'Consolas', 'Courier New', monospace;
      flex: 1;
    }

    .buttons-bar {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      padding: 12px 16px;
      background: #fff;
      border-top: 1px solid #ddd;
    }
    .btn {
      padding: 6px 20px;
      border: 1px solid #ccc;
      border-radius: 3px;
      font-size: 12px;
      cursor: pointer;
      background: #f0f0f0;
      color: #333;
      transition: all 0.15s;
    }
    .btn:hover:not(:disabled) {
      background: #e0e0e0;
      border-color: #bbb;
    }
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .btn-primary {
      background: #2196F3;
      border-color: #1976D2;
      color: #fff;
    }
    .btn-primary:hover:not(:disabled) {
      background: #1976D2;
      border-color: #1565C0;
    }
    .btn-primary:disabled {
      background: #90caf9;
      border-color: #90caf9;
    }

    #tree-container::-webkit-scrollbar { width: 8px; }
    #tree-container::-webkit-scrollbar-track { background: #f1f1f1; }
    #tree-container::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px; }
    #tree-container::-webkit-scrollbar-thumb:hover { background: #a1a1a1; }
  </style>
</head>
<body>
  <div class="dialog-header">
    <h2>🌲 Signal Selection</h2>
    <span class="selected-display" id="selected-display">No selection</span>
  </div>

  <div id="tree-container"></div>

  <div class="buttons-bar">
    <button class="btn" onclick="clearSelection()">Clear</button>
    <button class="btn" onclick="cancelDialog()">Cancel</button>
    <button class="btn btn-primary" id="btn-ok" onclick="submitSelection()" disabled>OK</button>
  </div>

  <script>
    

    let treeData = [];
    let selectedSignal = null;
    let preSelectedValue = null;

document.addEventListener("DOMContentLoaded", () => {
            window.electron.onSetList((data,preSelected) => {
                      treeData = data;
                      console.log("Received data for tree:", treeData);
      preSelectedValue = preSelected || null;
      renderTree();
      
      // تفعيل/تعطيل OK حسب وجود تحديد مسبق
      updateOkButton();
            });
 });

    function renderTree() {
      const container = document.getElementById('tree-container');
      container.innerHTML = '';
      
      treeData.forEach((item, index) => {
        const node = createNode(item, index);
        container.appendChild(node);
      });
    }

    function createNode(item, index) {
      const div = document.createElement('div');
      div.className = 'component-node';

      // Header
      const header = document.createElement('div');
      header.className = 'section-header';
      header.onclick = () => toggleSection(header, childrenDiv);

      const arrow = document.createElement('span');
      arrow.className = 'arrow';
      arrow.innerHTML = '▼';

      const title = document.createElement('span');
      title.className = 'section-title';
      title.textContent = item.name;

      header.appendChild(arrow);
      header.appendChild(title);
      div.appendChild(header);

      const childrenDiv = document.createElement('div');
      childrenDiv.className = 'children';

      // Case 1: groups (e.g., source -> voltage, current)
      if (item.groups && item.groups.length > 0) {
        item.groups.forEach(group => {
          childrenDiv.appendChild(createSubGroup(item.name, group.type, group.items, group.label));
        });
      }
      // Case 2: direct items (e.g., Resistor, param)
      else if (item.items && item.items.length > 0) {
        item.items.forEach(value => {
          childrenDiv.appendChild(createSignalRow(value, 'item'));
        });
      }
      // Case 3: legacy voltages/currents
      else {
        if (item.voltages && item.voltages.length > 0) {
          childrenDiv.appendChild(createSubGroup(item.name, 'voltages', item.voltages, 'Voltages'));
        }
        if (item.currents && item.currents.length > 0) {
          childrenDiv.appendChild(createSubGroup(item.name, 'currents', item.currents, 'Currents'));
        }
      }

      div.appendChild(childrenDiv);
      return div;
    }

    function createSubGroup(componentName, groupType, items, labelPrefix) {
      const subDiv = document.createElement('div');
      subDiv.className = 'sub-group';

      const subHeader = document.createElement('div');
      subHeader.className = 'sub-group-header';
      subHeader.onclick = (e) => {
        e.stopPropagation();
        toggleSection(subHeader, subChildren);
      };

      const arrow = document.createElement('span');
      arrow.className = 'arrow';
      arrow.innerHTML = '▼';

      const subTitle = document.createElement('span');
      subTitle.textContent = labelPrefix;

      subHeader.appendChild(arrow);
      subHeader.appendChild(subTitle);
      subDiv.appendChild(subHeader);

      const subChildren = document.createElement('div');
      subChildren.className = 'children';

      items.forEach((value) => {
        subChildren.appendChild(createSignalRow(value, groupType));
      });

      subDiv.appendChild(subChildren);
      return subDiv;
    }

    function createSignalRow(value, groupType) {
      const row = document.createElement('div');
      row.className = 'signal-row';
      row.dataset.value = value;
      row.onclick = (e) => {
        e.stopPropagation();
        selectRow(row, value);
      };

      // Pre-select if matches
      if (preSelectedValue && value === preSelectedValue) {
        row.classList.add('selected');
        selectedSignal = value;
        document.getElementById('selected-display').textContent = value;
      }

      const indicator = document.createElement('div');
      let typeClass = 'type-item';
      if (groupType === 'voltage' || groupType === 'voltages') typeClass = 'type-voltage';
      else if (groupType === 'current' || groupType === 'currents') typeClass = 'type-current';
      
      indicator.className = `type-indicator ${typeClass}`;

      const label = document.createElement('span');
      label.className = 'signal-label';
      label.textContent = value;

      row.appendChild(indicator);
      row.appendChild(label);
      return row;
    }

    function toggleSection(header, content) {
      const arrow = header.querySelector('.arrow');
      content.classList.toggle('collapsed');
      arrow.classList.toggle('collapsed');
      arrow.innerHTML = content.classList.contains('collapsed') ? '▶' : '▼';
    }

    function selectRow(rowElement, value) {
      document.querySelectorAll('.signal-row.selected').forEach(r => {
        r.classList.remove('selected');
      });

      rowElement.classList.add('selected');
      selectedSignal = value;
      document.getElementById('selected-display').textContent = value;
      updateOkButton();
    }

    function clearSelection() {
      document.querySelectorAll('.signal-row.selected').forEach(r => {
        r.classList.remove('selected');
      });
      selectedSignal = null;
      document.getElementById('selected-display').textContent = 'No selection';
      updateOkButton();
    }

    function updateOkButton() {
      const btnOk = document.getElementById('btn-ok');
      btnOk.disabled = !selectedSignal;
    }

    function submitSelection() {
      window.electron.sendEditedList(selectedSignal);
    }

    function cancelDialog() {
       window.electron.sendEditedList(null);
    }
  </script>
</body>
</html>
