<style>
  /* حاوية المكتبة */
#libraryPanel {
  width: 100%;
  overflow-x: hidden;
}

/* شبكة العناصر */
#symGrid {
  display: grid;
  grid-template-columns: repeat(3, 1fr); /* عنصرين في الصف */
  gap: 8px;
  padding: 5px;
  width: 100%;
  box-sizing: border-box;
}

/* كل عنصر في الشبكة */
.symItem {
  border: 1px solid #ccc;
  text-align: center;
  padding: 5px;
  background: #f9f9f9;
  border-radius: 4px;
  transition: all 0.2s;
  min-width: 0; /* مهم لمنع overflow */
}

.symItem:hover {
  background: #e9e9e9;
  border-color: #999;
}

/* الزر داخل العنصر */
.button_lib {
  width: 100%;
  height: auto;
  padding: 5px;
  background: #fff;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}

.button_lib svg {
  max-width: 100%;
  height: auto;
  display: block;
}

/* النص تحت الرمز */
.symItem p {
  margin: 5px 0 0 0;
  font-size: 11px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.symItem p a {
  text-decoration: none;
  color: #333;
}

.symItem p a:hover {
  color: #0066cc;
}


</style>


</head>
